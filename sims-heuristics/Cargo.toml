[package]
name = "sims-heuristics"
version = "0.1.0"
edition = "2021"
autobenches = false

[lib]
name = "pls"

[[bin]]
name = "pls"
path = "src/main.rs"
test = false
bench = false

[[bench]]
name = "unique_values_count_bench"
harness = false

[dev-dependencies]
criterion = "0.5.1"

[dependencies]
log = "0.4.22"
stderrlog = "0.6.0"
rand = "0.8.5"
regex = "1.11.1"
itertools = "0.13.0"
clap = { version = "4.5.23", features = ["derive"] }
csv = "1.3.1"
serde = "1.0.216"
chrono = "0.4.39"
plotters = { version = "0.3.7", optional = true }
bitvec = { version = "1.0.1", optional = true }
humantime = "2.1.0"

[features]
plotting = ["plotters"]
bitmaps = ["bitvec"]

[profile.release]
debug = true
codegen-units = 1
lto = "fat"
panic = "abort"

[lints.clippy]
needless_return = "allow"
# arithmetic_side_effects = "warn"

